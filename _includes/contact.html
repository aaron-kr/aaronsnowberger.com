{% assign c = site.data.contact %}
<!-- ══ CONTACT ═══════════════════════════════════════════════ -->
<section id="contact">
  <div class="wrap" style="text-align:center">
    <div class="sec-label rise in" style="justify-content:center">
      <span class="en">{{ c.label_en }}</span><span class="ko">{{ c.label_ko }}</span>
    </div>
    <h2 class="contact-h rise rise-d1 in">
      <span class="en">{{ c.heading_en }}</span>
      <span class="ko">{{ c.heading_ko }}</span>
    </h2>
    <p class="contact-sub rise rise-d2 in">
      <span class="en">{{ c.desc_en }}</span>
      <span class="ko">{{ c.desc_ko }}</span>
    </p>
    <div class="contact-actions rise rise-d2 in">
      {% for btn in c.buttons %}
      <a href="{{ btn.href }}"
         class="{{ btn.class }}"
         {% if btn.type == "external" %}target="_blank"{% endif %}>
        {% if btn.type == "email" %}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,12 2,6"></polyline></svg>
        {% endif %}
        <span class="en">{{ btn.label_en }}</span><span class="ko">{{ btn.label_ko }}</span>
      </a>
      {% endfor %}
    </div>
    <p class="contact-email rise rise-d3 in">
      <a href="mailto:{{ c.email }}">{{ c.email }}</a>
    </p>
  </div>
</section>
