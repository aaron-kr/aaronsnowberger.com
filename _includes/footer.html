<footer class="ms">
  <div class="foot-inner">
    <!-- LEFT -->
    <div class="foot-left">
      <div class="foot-name">Aaron <span>Snowberger</span>, Ph.D.</div>
      <div class="foot-info">
        <span class="en">Jeonju, South Korea</span>
        <span class="ko">전주, 대한민국</span>
        <p style="font-size:.72rem;color:var(--t3);margin-top:.3rem;">
          © {% capture current_year %}{{ 'now' | date: "%Y" }}{% endcapture %}{{ current_year }} Aaron Snowberger
        </p>
      </div>
    </div>

    <!-- CENTER: Wyoming cowboy hat -->
    <div className="foot-center">
      <a
        href="https://en.wikipedia.org/wiki/Wyoming"
        class="wy-logo"
        target="_blank"
        rel="noopener noreferrer"
        title="Wyoming, USA — Big Sky Country"
      >
        <img
          class="wy-logo-img"  
          src="{{ '/assets/img/wyoming_cowboys_no-txt.webp' | relative_url }}"
          alt="Wyoming Cowboy"
          loading="lazy"
        />
      </a>
    </div>

    <!-- RIGHT: links -->
    <div class="foot-right">
      <div class="fl-row">
        <a href="{{ site.profiles.linkedin }}" class="fl t" target="_blank">LinkedIn</a>
        <a href="{{ site.profiles.github }}" class="fl t" target="_blank">GitHub</a>
        <a href="{{ site.profiles.courses }}" class="fl t" target="_blank">Courses</a>
      </div>
      <div class="fl-row">
        <a href="{{ site.profiles.researchgate }}" class="fl b" target="_blank">ResearchGate</a>
        <a href="{{ site.profiles.google_scholar }}" class="fl b" target="_blank">Scholar</a>
        <a href="{{ site.profiles.orcid }}" class="fl b" target="_blank">ORCID</a>
      </div>
      <div class="fl-row">
        <a href="{{ site.profiles.kspai }}" class="fl p" target="_blank">KSPAI</a>
        <a href="{{ site.profiles.naver }}" class="fl p" target="_blank">Naver</a>
        <a href="{{ site.profiles.academic_site }}/content" class="fl p" target="_blank">Blog</a>
      </div>
      <div class="fl-row">
        <a href="{{ '/cv/' | relative_url }}" class="fl t">CV</a>
        <a href="{{ site.profiles.academic_site }}" class="fl t" target="_blank">aaron.kr</a>
        <a href="{{ site.profiles.lab_site }}" class="fl t" target="_blank">Lab</a>
      </div>
    </div>
  </div>
