<nav id="mainnav" aria-label="Main navigation">
  <a href="#hero" class="nav-logo" aria-label="Aaron Snowberger — home">
    Aaron Snowberger<span class="en">, Ph.D.</span><span class="ko">, 박사</span>
  </a>

  <div class="nav-links" role="list">
    {% for link in site.nav_links %}
    <a href="#{{ link.id }}" class="nav-link" role="listitem">
      <span class="en">{{ link.en }}</span>
      <span class="ko">{{ link.ko }}</span>
    </a>
    {% endfor %}
  </div>

  <div class="nav-actions">
    <a href="/cv" class="nbtn fs cv-nav-btn">CV</a>
    <button class="nbtn aurora-btn fs" id="auroraBtn" aria-pressed="false" aria-label="Toggle aurora effect">✦</button>
    <button class="nbtn fs" id="langBtn" aria-label="Switch to Korean">한국어</button>
    <button class="nbtn fs" id="themeBtn" aria-label="Switch to light mode">☀</button>
    <button class="hamburger" id="ham" aria-label="Open mobile menu" aria-expanded="false" aria-controls="mobMenu">
      <span aria-hidden="true"></span><span aria-hidden="true"></span><span aria-hidden="true"></span>
    </button>
  </div>
</nav>

<nav class="mob-menu" id="mobMenu" aria-label="Mobile navigation">
  {% for link in site.nav_links %}
  <a href="#{{ link.id }}">
    <span class="en">{{ link.en }}</span>
    <span class="ko">{{ link.ko }}</span>
  </a>
  {% endfor %}
  <a href="/cv"><span class="en">CV</span><span class="ko">이력서</span></a>
</nav>
