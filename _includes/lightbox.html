<div class="modal-bg" id="lightbox" role="dialog" aria-modal="true" aria-label="Image lightbox">
  <div class="modal-img-wrap" id="lightboxWrap">
    <button class="modal-close-btn fs" id="lightboxClose" aria-label="Close image viewer">
      <span aria-hidden="true">✕</span>
    </button>
    <img src="" alt="" id="lightboxImg">
    <div class="modal-caption" id="lightboxCaption"></div>
    <div style="text-align:center">
      <a href="#lightbox" class="modal-dl-btn fs" id="lightboxDl" download aria-label="Download full size image">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="en">Download Full Size</span>
        <span class="ko">원본 다운로드</span>
      </a>
    </div>
  </div>
</div>
