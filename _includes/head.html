<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicon — place favicon files in /assets/img/favicon/ -->
<link rel="icon" type="image/png" sizes="32x32"   href="{{ '/assets/img/favicon/favicon-32x32.png'   | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16"   href="{{ '/assets/img/favicon/favicon-16x16.png'   | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180"      href="{{ '/assets/img/favicon/apple-touch-icon.png' | relative_url }}">
<link rel="manifest"                              href="{{ '/assets/img/favicon/site.webmanifest'     | relative_url }}">
<link rel="shortcut icon"                         href="{{ '/assets/img/favicon/favicon.ico'          | relative_url }}">
<meta name="theme-color" content="#2dd4bf">

<!-- Anti-flash: apply saved theme before first paint -->
<script>
  (function(){
    var t=localStorage.getItem('asb_theme'),l=localStorage.getItem('asb_lang'),a=localStorage.getItem('asb_aurora');
    if(t)document.documentElement.setAttribute('data-theme',t);
    if(l)document.documentElement.setAttribute('data-lang',l);
    if(a)document.documentElement.setAttribute('data-aurora',a);
  })();
</script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600;1,700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- QR library (loaded here so it's available on DOMContentLoaded) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>

<!-- SEO (jekyll-seo-tag) -->
{% seo %}
