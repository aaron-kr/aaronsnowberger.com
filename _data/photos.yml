# ══════════════════════════════════════════════════════════════
#  Photos section — press photo library
#  Used by: _includes/photos.html
#
#  For each card:
#    thumb       — URL of the thumbnail image (460px-ish). Leave blank for placeholder.
#    lightbox_src — URL of the medium/large lightbox image.
