#    caption     — Lightbox caption text.
#    alt         — <img> alt attribute.
#    placeholder_en / placeholder_ko — shown when thumb is blank.
#    delay       — rise animation delay class: "" | "rise-d1" | "rise-d2" etc.
# ══════════════════════════════════════════════════════════════

