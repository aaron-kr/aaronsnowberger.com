# ══════════════════════════════════════════════════════════════
#  Brand Assets section
#  Used by: _includes/assets-section.html
#
#  card type values (controls the preview block rendered in the template):
#    signature — shows the .sig-preview styled name
#    colors    — renders the color-swatches from the swatches list below
#    qrcodes   — renders the qr_codes list (JS-generated QR images)
#    kspai     — shows a simple link card
# ══════════════════════════════════════════════════════════════

label_en:   "Brand Assets"
label_ko:   "브랜드 자료"
heading_en: "Logos &amp; <em>downloadables</em>"
heading_ko: "로고 &amp; <em>다운로드 자료</em>"
desc_en:    "Everything a designer, event organizer, or podcast producer needs in one place."
desc_ko:    "디자이너, 행사 기획자, 팟캐스트 제작자에게 필요한 모든 자료를 한곳에."

# ── Color swatches (used by the "colors" card type) ───────────
# border is optional; only needed for dark swatches that need a visible border.
swatches:
  - name: "Teal"
    hex:  "#2DD4BF"
  - name: "Blue"
    hex:  "#38BDF8"
  - name: "Purple"
    hex:  "#A78BFA"
  - name: "Pink"
    hex:  "#E879F9"
  - name: "Dark"
    hex:  "#0C0F0E"
    border: "rgba(255,255,255,.2)"

# ── QR codes (used by the "qrcodes" card type) ────────────────
# id must match the element ID used by the JS QR generator.
qr_codes:
  - id:    "qr-asb-main"
    url:   "https://aaron.kr"
    label: "aaron.kr"
  - id:    "qr-asb-lab"
    url:   "https://pailab.io"
    label: "lab"
  - id:    "qr-asb-courses"
    url:   "https://aaronkr-courses.github.io/courses/"
    label: "courses"

# ── Asset cards ───────────────────────────────────────────────
cards:
  - type:     "signature"
    delay:    ""
    icon_class: "ai-t"
    icon_glyph: "🖊"
    title_en: "Signature / Wordmark"
    title_ko: "서명 / 워드마크"
    desc_en:  "Personal signature graphic for email footers, slide decks, and branded documents."
    desc_ko:  "이메일 서명, 슬라이드 덱, 브랜드 문서에 사용하는 개인 서명 그래픽."
    downloads:
      - label: "Google Drive 🔒"
        href:  "https://drive.google.com/drive/folders/1KCSw-EfFvW27j1cxLEI4q8S2kOqqyd4e?usp=drive_link"

  - type:     "colors"
    delay:    "rise-d1"
    icon_class: "ai-b"
    icon_glyph: "🎨"
    title_en: "Brand Color Palette"
    title_ko: "브랜드 색상"
    desc_en:  "Click any swatch to copy its HEX value."
    desc_ko:  "색상 클릭 시 HEX 값이 복사됩니다."

  - type:     "qrcodes"
    delay:    "rise-d2"
    icon_class: "ai-t"
    icon_type: "qr"
    title_en: "QR Codes"
    title_ko: "QR 코드"
    desc_en:  "Pre-generated QR codes for print materials and slide decks."
    desc_ko:  "인쇄물 및 슬라이드 덱용 QR 코드."
    dl_en:    "" # No download link since these are generated by JS; users can right-click to save the images directly.
    dl_ko:    ""

