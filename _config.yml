# ── Safe mode (required for GitHub Pages) ─────────────────────
safe:         true
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# ── Exclude from build ────────────────────────────────────────
exclude:
  - README.md
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - "*.sh"
